name: Mirroring

on:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Mirroring
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.MONOREPO_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/EpitechPGE3-2025/G-EIP-600-PAR-6-1-eip-23/dispatches \
          -d '{"event_type":"update-frontMobile"}'